version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: solar_epc
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    env_file:
      - ../.env.example
    depends_on:
      - postgres
      - redis
    volumes:
      - ../backend:/app
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../backend
    env_file:
      - ../.env.example
    depends_on:
      - postgres
      - redis
    volumes:
      - ../backend:/app
      - uploads_data:/app/uploads
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build:
      context: ../frontend
    volumes:
      - ../frontend:/usr/src/app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  uploads_data:
