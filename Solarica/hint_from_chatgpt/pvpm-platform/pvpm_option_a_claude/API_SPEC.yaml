openapi: 3.0.3
info:
  title: PVPM Mission API
  version: 0.1.0
paths:
  /missions:
    get:
      summary: List missions
    post:
      summary: Create mission
  /missions/{missionId}:
    get:
      summary: Get mission details
  /missions/{missionId}/items:
    post:
      summary: Add mission items
  /missions/{missionId}/start:
    post:
      summary: Start mission execution
  /missions/{missionId}/current-item:
    get:
      summary: Get current mission item
  /missions/{missionId}/measure:
    post:
      summary: Perform measurement for current item
  /mission-items/{itemId}/skip:
    post:
      summary: Skip mission item
  /mission-items/{itemId}/notes:
    post:
      summary: Add note to mission item
  /measurements:
    get:
      summary: List measurements
  /measurements/{measurementId}:
    get:
      summary: Get measurement detail
components:
  schemas:
    Mission:
      type: object
      properties:
        id: { type: string, format: uuid }
        siteName: { type: string }
        missionName: { type: string }
        status: { type: string }
    MissionItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        missionId: { type: string, format: uuid }
        sequenceNo: { type: integer }
        stringName: { type: string }
        status: { type: string }
    Measurement:
      type: object
      properties:
        id: { type: string, format: uuid }
        missionId: { type: string, format: uuid }
        missionItemId: { type: string, format: uuid }
        stringName: { type: string }
        measuredAt: { type: string, format: date-time }
        deviceSerial: { type: string }
        voc: { type: number }
        isc: { type: number }
        vmp: { type: number }
        imp: { type: number }
        pmax: { type: number }
        ff: { type: number }
        rs: { type: number }
        rp: { type: number }
        irradiance: { type: number }
        moduleTemp: { type: number }
