# ─────────────────────────────────────────────────────────────────────────────
# Nginx – serves the React SPA and reverse-proxies the FastAPI backend.
# Used inside the frontend Docker image only.
# For local development, use `npm run dev` (Vite handles proxying).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Serve pre-built React static files
    root /usr/share/nginx/html;
    index index.html;

    # Increase upload size (for PVPM file uploads)
    client_max_body_size 64M;

    # Gzip static assets
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Backend API proxy ────────────────────────────────────────────────────
    # All /api/* requests are forwarded to the backend service.
    # The backend is reachable at http://backend:8000 (Docker internal DNS).
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large file uploads (PVPM measurement files)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # ── React SPA – HTML5 history fallback ───────────────────────────────────
    # Any path that doesn't map to a static file returns index.html so that
    # client-side routing works correctly.
    location / {
        try_files $uri $uri/ /index.html;

        # Cache HTML minimally (forces browser to re-check)
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── Static assets – long-lived cache ────────────────────────────────────
    # Vite emits hashed filenames so these are safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;
}
