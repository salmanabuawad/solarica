# Nginx vhost — solarica.wavelync.com
#
# Install:
#   sudo cp solarica.wavelync.com.conf /etc/nginx/sites-available/solarica.wavelync.com
#   sudo ln -s /etc/nginx/sites-available/solarica.wavelync.com \
#              /etc/nginx/sites-enabled/solarica.wavelync.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (after DNS + HTTP works):
#   sudo certbot --nginx -d solarica.wavelync.com
#
# API backend: uvicorn on 127.0.0.1:8013  (systemd unit: solarica.service)
# Static:      /var/www/solarica           (React build output)

server {
    listen 80;
    server_name solarica.wavelync.com;

    # React SPA static files
    root /var/www/solarica;
    index index.html;

    # ── Backend API proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8013/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # PVPM measurement file uploads can be large
        client_max_body_size 64m;
    }

    # ── React SPA fallback ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── Hashed static assets — long-lived cache ──────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;
}
