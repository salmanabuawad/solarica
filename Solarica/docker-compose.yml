services:

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL – primary database
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ivcare}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose 5432 locally for migrations / DBeaver (remove in production)
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ivcare}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend – FastAPI / Uvicorn
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ivcare}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      WATCH_IMPORT_FOLDER: ${WATCH_IMPORT_FOLDER:-false}
    volumes:
      # Shared folder – drop PVPM export files here to trigger auto-import
      - import_data:/app/import_data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Internal only – not published; nginx proxies /api
    expose:
      - "8000"

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend – React (built at image-build time) served by Nginx
  # Nginx also reverse-proxies /api/* → backend:8000
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  import_data:
