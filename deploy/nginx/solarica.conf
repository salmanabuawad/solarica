# Solarica Nginx reverse proxy + SPA static serving.
#
# Assumes:
# - React build output is in: /usr/share/nginx/html
# - FastAPI backend is reachable at: http://backend:8000 (docker-compose) OR http://127.0.0.1:8000 (local)
#
# If you run local (not Docker), change `upstream backend_upstream` to 127.0.0.1:8000.

upstream backend_upstream {
  server 127.0.0.1:8000;
  keepalive 32;
}

server {
  listen 80;
  server_name solarica.wavelync.com;

  root /var/www/solarica;
  index index.html;

  # React SPA
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API
  location /api/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Project static artifacts (images/xlsx/json). Served by FastAPI StaticFiles.
  location /projects/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

