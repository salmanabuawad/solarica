<?xml version="1.0" encoding="UTF-8"?>
<!--
  Solarica wordmark.
    • "SOLARICA" set in a heavy condensed sans (Montserrat 800 → Arial Black fallback) in deep navy.
    • Orange chevron — the brand "A" — perches above the second "A" letter.
    • Tagline "FROM DESIGN TO OPERATION" runs underneath with two green
      dashes flanking the gerund pair.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif">
  <!-- Wordmark "SOLARICA" -->
  <text x="50%" y="120"
        text-anchor="middle"
        fill="#16335c"
        font-size="138"
        font-weight="800"
        letter-spacing="-2">SOLARICA</text>

  <!-- Orange chevron / brand "A" sitting on top of the second 'A' -->
  <g stroke="#f08c1a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M462 90 L504 30 L546 90"/>
  </g>

  <!-- Tagline rule: green dash + "FROM DESIGN TO OPERATION" + green dash -->
  <g font-size="22" font-weight="700" letter-spacing="3" fill="#16335c">
    <line x1="120" y1="170" x2="180" y2="170" stroke="#1e9d3a" stroke-width="3" stroke-linecap="round"/>
    <text x="50%" y="178" text-anchor="middle">FROM DESIGN TO OPERATION</text>
    <line x1="540" y1="170" x2="600" y2="170" stroke="#1e9d3a" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
