<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- connecting cable across the three optimizers, with plug ends -->
  <path d="M2 24 H46" fill="none" stroke="#16202e" stroke-width="2.4" stroke-linecap="round"/>
  <!-- three solar panels -->
  <g stroke="#16202e">
    <rect x="3" y="6" width="12" height="10" rx="1.4" fill="#cdeaf3" stroke-width="1.6"/>
    <rect x="18" y="6" width="12" height="10" rx="1.4" fill="#cdeaf3" stroke-width="1.6"/>
    <rect x="33" y="6" width="12" height="10" rx="1.4" fill="#cdeaf3" stroke-width="1.6"/>
    <g fill="none" stroke-width="1.1">
      <path d="M3 11 H15 M7 6 V16 M11 6 V16"/>
      <path d="M18 11 H30 M22 6 V16 M26 6 V16"/>
      <path d="M33 11 H45 M37 6 V16 M41 6 V16"/>
    </g>
  </g>
  <!-- drop cables panel -> optimizer -->
  <g fill="none" stroke="#16202e" stroke-width="1.6">
    <path d="M9 16 V20"/><path d="M24 16 V20"/><path d="M39 16 V20"/>
  </g>
  <!-- optimizer boxes -->
  <g fill="#1f2a3a" stroke="#16202e" stroke-width="1.4">
    <rect x="5" y="20" width="8" height="7.6" rx="1.4"/>
    <rect x="20" y="20" width="8" height="7.6" rx="1.4"/>
    <rect x="35" y="20" width="8" height="7.6" rx="1.4"/>
  </g>
  <!-- bolts -->
  <g fill="#fbbf24">
    <path d="M10 21 L7.2 24 L8.8 24 L8 26.4 L10.8 23 L9.2 23 Z"/>
    <path d="M25 21 L22.2 24 L23.8 24 L23 26.4 L25.8 23 L24.2 23 Z"/>
    <path d="M40 21 L37.2 24 L38.8 24 L38 26.4 L40.8 23 L39.2 23 Z"/>
  </g>
  <!-- end plugs -->
  <g fill="#5cb6d6" stroke="#16202e" stroke-width="1.5">
    <rect x="0.5" y="21.6" width="3.5" height="4.8" rx="1"/>
    <rect x="44" y="21.6" width="3.5" height="4.8" rx="1"/>
  </g>
</svg>
