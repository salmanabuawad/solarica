<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- PV combiner box (TGA) enclosure -->
  <rect x="8" y="5" width="32" height="22" rx="2.5" fill="#e2e8f0" stroke="#2b3340" stroke-width="2"/>
  <!-- lid seam -->
  <line x1="8" y1="10.5" x2="40" y2="10.5" stroke="#2b3340" stroke-width="1.3"/>
  <!-- high-voltage hazard triangle + bolt -->
  <path d="M24 12.5 L29 21.5 H19 Z" fill="#facc15" stroke="#2b3340" stroke-width="1.1" stroke-linejoin="round"/>
  <path d="M24.7 15 L22 19.2 h2 l-0.8 2.4 3-3.4 H25.4 Z" fill="#2b3340"/>
  <!-- cable glands -->
  <g fill="#2b3340">
    <rect x="11" y="27" width="2.6" height="4" rx="1.1"/>
    <rect x="16.6" y="27" width="2.6" height="4" rx="1.1"/>
    <rect x="22.2" y="27" width="2.6" height="4" rx="1.1"/>
    <rect x="27.8" y="27" width="2.6" height="4" rx="1.1"/>
    <rect x="33.4" y="27" width="2.6" height="4" rx="1.1"/>
  </g>
  <!-- commissioned: green check badge -->
  <circle cx="38" cy="38" r="8.5" fill="#16a34a" stroke="#ffffff" stroke-width="2"/>
  <path d="M34.1 38.2 l2.7 2.7 l4.7-5.3" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
