<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- output cable connectors -->
  <g stroke="#16202e" stroke-width="2.4" stroke-linecap="round">
    <path d="M11 38 V45"/><path d="M17.5 38 V46"/><path d="M24 38 V45"/><path d="M30.5 38 V46"/><path d="M37 38 V45"/>
  </g>
  <!-- TGA combiner box — green background = commissioned (fills the canvas) -->
  <rect x="3" y="2.5" width="42" height="36.5" rx="5" fill="#16a34a" stroke="#16202e" stroke-width="2.8"/>
  <!-- TGA label -->
  <text x="24" y="19" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="13.5" fill="#ffffff">TGA</text>
  <!-- commissioned check badge -->
  <circle cx="24" cy="29.5" r="7.8" fill="#ffffff" stroke="#166534" stroke-width="1.4"/>
  <path d="M20 29.7 l2.7 2.7 l5.2 -5.6" fill="none" stroke="#16a34a" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
