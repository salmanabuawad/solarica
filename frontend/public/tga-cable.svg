<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- TGA combiner box -->
  <rect x="6" y="6" width="27" height="23" rx="4" fill="#eef2f6" stroke="#16202e" stroke-width="2.6"/>
  <!-- side mounting tabs -->
  <g fill="#cbd5e1" stroke="#16202e" stroke-width="1.2">
    <rect x="3.6" y="11" width="2.6" height="4" rx="0.6"/>
    <rect x="3.6" y="20" width="2.6" height="4" rx="0.6"/>
  </g>
  <!-- TGA label -->
  <text x="19.5" y="21" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="10.5" fill="#1d4ed8">TGA</text>
  <!-- + / - output cables on the right -->
  <g stroke="#16202e" stroke-width="2.2" stroke-linecap="round">
    <path d="M33 14 H43"/><path d="M33 19.5 H43"/>
  </g>
  <text x="45.6" y="16.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="7.5" fill="#e11d48">+</text>
  <text x="45.6" y="22.6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="9" fill="#16202e">−</text>
  <!-- bottom string cables into the TGA -->
  <g fill="none" stroke="#16202e" stroke-width="2.4" stroke-linecap="round">
    <path d="M9 31 V45"/><path d="M13.2 31 V45"/><path d="M17.4 31 V45"/><path d="M21.6 31 V45"/><path d="M25.8 31 V45"/><path d="M30 31 V45"/>
  </g>
  <!-- cable glands -->
  <g fill="#3a4250" stroke="#16202e" stroke-width="1">
    <rect x="7.7" y="28.6" width="2.6" height="3.6" rx="0.7"/>
    <rect x="11.9" y="28.6" width="2.6" height="3.6" rx="0.7"/>
    <rect x="16.1" y="28.6" width="2.6" height="3.6" rx="0.7"/>
    <rect x="20.3" y="28.6" width="2.6" height="3.6" rx="0.7"/>
    <rect x="24.5" y="28.6" width="2.6" height="3.6" rx="0.7"/>
    <rect x="28.7" y="28.6" width="2.6" height="3.6" rx="0.7"/>
  </g>
</svg>
