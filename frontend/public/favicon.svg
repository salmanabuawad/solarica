<!-- Solarica favicon — orange "A" (the accent letter from the wordmark) on a navy square. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0f2942"/>
  <!-- A glyph rendered as two strokes so it reads well at 16×16.
       Bar across the middle + two diagonal legs, all in the brand orange. -->
  <g fill="none" stroke="#f97316" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 50 L32 14 L50 50"/>
    <line x1="22" y1="38" x2="42" y2="38"/>
  </g>
</svg>
