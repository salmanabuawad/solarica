<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- multimeter body -->
  <rect x="10" y="5" width="28" height="38" rx="4" fill="#0891b2" stroke="#0b3a48" stroke-width="2"/>
  <!-- display -->
  <rect x="14" y="9" width="20" height="12" rx="2" fill="#ecfeff" stroke="#0b3a48" stroke-width="1.4"/>
  <!-- reading: lightning bolt + V -->
  <path d="M21.5 11 L17.3 17 H20 L18.7 20 L23.8 14 H20.9 Z" fill="#0891b2" stroke="#0b3a48" stroke-width="0.6" stroke-linejoin="round"/>
  <text x="29" y="19.2" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="8.5" fill="#0b3a48" text-anchor="middle">V</text>
  <!-- selector dial + needle -->
  <circle cx="24" cy="31" r="7" fill="#ecfeff" stroke="#0b3a48" stroke-width="1.6"/>
  <line x1="24" y1="31" x2="28.6" y2="26.8" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="31" r="1.7" fill="#0b3a48"/>
  <!-- probe jacks -->
  <circle cx="18" cy="40" r="1.7" fill="#0b3a48"/>
  <circle cx="30" cy="40" r="1.7" fill="#dc2626"/>
</svg>
